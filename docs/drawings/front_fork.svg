<svg width="600" height="900" viewBox="0 0 600 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Front/Side Details -->

  <!-- Steerer Shaft (15mm Rod) with Collars -->
  <rect id="steerer_shaft" x="292.5" y="50" width="15" height="300" fill="gray" stroke="black" stroke-width="1" />
  <rect id="shaft_collar_top" x="285" y="80" width="30" height="10" fill="silver" stroke="black" />

  <!-- Fork Crown (10mm Plate) -->
  <rect id="fork_crown" x="175" y="350" width="250" height="10" fill="black" />

  <!-- Fork Legs (40x20mm) -->
  <rect id="fork_leg_left" x="175" y="360" width="25" height="400" fill="none" stroke="black" stroke-width="3" />
  <rect id="fork_leg_right" x="400" y="360" width="25" height="400" fill="none" stroke="black" stroke-width="3" />

  <!-- Brake Caliper Mount (PM) -->
  <rect id="brake_mount" x="155" y="600" width="20" height="60" fill="none" stroke="red" stroke-width="2" />

  <!-- Steering Stops (Pins) -->
  <circle id="steering_stop_l" cx="225" cy="355" r="5" fill="red" />
  <circle id="steering_stop_r" cx="375" cy="355" r="5" fill="red" />

  <!-- Torque Arm Interface -->
  <rect id="torque_arm_tab" x="175" y="750" width="10" height="30" fill="blue" />

  <!-- Front Dropout (10.2mm) -->
  <rect id="front_dropout_left" x="175" y="760" width="25" height="40" fill="none" stroke="black" stroke-width="2" />
  <circle id="front_axle_center" cx="300" cy="780" r="5" fill="red" />

  <text x="50" y="30" font-family="Arial" font-size="18" font-weight="bold">Detailed Front Fork (200mm Inner Spacing)</text>
</svg>
