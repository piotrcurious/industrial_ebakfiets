<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. View from front -->

  <!-- Steerer Shaft (15mm Precision Rod) -->
  <rect id="steerer_shaft" x="292.5" y="50" width="15" height="300" fill="gray" stroke="black" stroke-width="1" />

  <!-- Fork Crown (10mm Plate) -->
  <!-- Width expanded to 250mm to ensure 200mm inner spacing -->
  <rect id="fork_crown" x="175" y="350" width="250" height="10" fill="none" stroke="black" stroke-width="2" />

  <!-- Fork Legs (40x20mm tubing) -->
  <!-- Inner width = 200mm -->
  <rect id="fork_leg_left" x="175" y="360" width="25" height="350" fill="none" stroke="black" stroke-width="2" />
  <rect id="fork_leg_right" x="400" y="360" width="25" height="350" fill="none" stroke="black" stroke-width="2" />

  <!-- Front Dropout (10.2mm slot) -->
  <rect id="front_dropout_left" x="175" y="710" width="25" height="40" fill="none" stroke="black" stroke-width="2" />
  <circle id="front_axle_center" cx="300" cy="730" r="5" fill="red" />

  <!-- Steering Arm (100mm) -->
  <rect id="steering_arm" x="300" y="340" width="100" height="10" fill="none" stroke="red" stroke-width="1" />

  <text x="50" y="30" font-family="Arial" font-size="16">Front Fork (Inner Spacing 200mm)</text>
</svg>
