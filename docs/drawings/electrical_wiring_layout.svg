<svg width="2500" height="800" viewBox="0 0 2500 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Side View Schematic -->
  <title>Electrical Wiring Cabling Layout</title>

  <!-- Frame Outline (Reference) -->
  <rect x="500" y="400" width="1800" height="40" fill="none" stroke="gray" stroke-dasharray="5,5" />

  <!-- Front Power Unit -->
  <rect id="front_battery" x="2100" y="300" width="150" height="80" fill="green" opacity="0.3" stroke="black" />
  <rect id="front_esc" x="2150" y="385" width="80" height="50" fill="blue" opacity="0.3" stroke="black" />
  <circle cx="2300" cy="450" r="15" fill="red" opacity="0.2" /> <!-- Front Motor Ref -->

  <!-- Rear Power Unit -->
  <rect id="rear_battery" x="600" y="300" width="150" height="80" fill="green" opacity="0.3" stroke="black" />
  <rect id="rear_esc" x="650" y="385" width="80" height="50" fill="blue" opacity="0.3" stroke="black" />
  <circle cx="500" cy="450" r="15" fill="red" opacity="0.2" /> <!-- Rear Motor Ref -->

  <!-- 8AWG Equalizer Wire -->
  <path id="equalizer_wire" d="M 750 340 L 2100 340" fill="none" stroke="orange" stroke-width="8" />

  <!-- Motor Wiring (Short Runs) -->
  <path id="front_motor_cable" d="M 2190 435 L 2300 450" fill="none" stroke="black" stroke-width="4" />
  <path id="rear_motor_cable" d="M 690 435 L 500 450" fill="none" stroke="black" stroke-width="4" />

  <!-- Control Wiring (Signal) -->
  <path id="signal_harness" d="M 2200 100 Q 1500 100 690 385" fill="none" stroke="purple" stroke-width="2" />

  <!-- Legend -->
  <text x="100" y="100" font-family="Arial" font-size="20" fill="orange" font-weight="bold">8AWG Equalizer Wire</text>
  <text x="100" y="140" font-family="Arial" font-size="20" fill="purple" font-weight="bold">Signal Harness (Throttle and Brake)</text>
  <text x="100" y="180" font-family="Arial" font-size="20" fill="black" font-weight="bold">Localized Motor Power</text>

  <text x="1000" y="50" font-family="Arial" font-size="30" font-weight="bold">Wiring and Cabling Layout (Decentralized)</text>
</svg>
