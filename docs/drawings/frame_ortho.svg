<svg width="2500" height="1500" viewBox="0 0 2500 1500" xmlns="http://www.w3.org/2000/svg">
  <!-- 1:1 Scale. First Angle Ortho -->
  <title>Main Frame Ortho - Master Assembly Match</title>

  <!-- SIDE VIEW -->
  <g id="side_view" transform="translate(100, 100)">
    <rect x="0" y="400" width="1800" height="40" fill="gray" stroke="black" stroke-width="2" />
    <g transform="rotate(-22 1800 400)">
       <rect x="1779" y="250" width="42" height="150" fill="none" stroke="blue" stroke-width="3" />
    </g>
    <text x="900" y="500" font-family="Arial" font-size="24" text-anchor="middle">SIDE VIEW (68 deg Head Angle)</text>
  </g>

  <!-- TOP VIEW -->
  <g id="top_view" transform="translate(100, 600)">
    <rect x="0" y="0" width="1800" height="20" fill="gray" />
    <rect x="0" y="810" width="1800" height="20" fill="gray" />
    <rect x="400" y="20" width="1210" height="770" fill="green" opacity="0.2" />
    <text x="900" y="900" font-family="Arial" font-size="24" text-anchor="middle">TOP VIEW (810mm Internal Bed)</text>
  </g>

  <text x="1250" y="60" font-family="Arial" font-size="48" font-weight="bold" text-anchor="middle">Frame Drawing: Dimensional Match</text>
</svg>
