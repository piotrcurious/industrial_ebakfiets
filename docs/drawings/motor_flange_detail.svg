<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. First Angle Detail -->
  <title>Motor Flange Detail Orthographic</title>

  <!-- 1. PLAN VIEW (Central) -->
  <g id="plan_view" transform="translate(150, 200)">
    <circle r="75" fill="none" stroke="black" stroke-width="2" />
    <!-- Bolt patterns -->
    <circle cx="0" cy="-65" r="6" fill="none" stroke="black" />
    <circle cx="0" cy="65" r="6" fill="none" stroke="black" />
    <circle cx="-65" cy="0" r="6" fill="none" stroke="black" />
    <circle cx="65" cy="0" r="6" fill="none" stroke="black" />
    <circle r="25" fill="none" stroke="black" stroke-width="2" />
    <text x="0" y="100" font-family="Arial" font-size="14" text-anchor="middle">PLAN VIEW</text>
  </g>

  <!-- 2. SECTION VIEW (Right) -->
  <g id="section_view" transform="translate(450, 200)">
    <rect x="-2.5" y="-75" width="5" height="150" fill="gray" stroke="black" />
    <line x1="-10" y1="-65" x2="10" y2="-65" stroke="black" stroke-width="1" />
    <line x1="-10" y1="65" x2="10" y2="65" stroke="black" stroke-width="1" />
    <text x="0" y="100" font-family="Arial" font-size="14" text-anchor="middle">SECTION VIEW (5mm Steel)</text>
  </g>

  <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Motor Flange detail (Orthographic)</text>
</svg>
