<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Front View Detail -->
  <title>Motor Flange Detail</title>

  <!-- Outer Diameter (matching rim patterns) -->
  <circle id="flange_outer" cx="200" cy="200" r="75" fill="none" stroke="black" stroke-width="2" />

  <!-- Rim Bolt Pattern (4x100) -->
  <circle cx="200" cy="130" r="6" fill="gray" stroke="black" />
  <circle cx="200" cy="270" r="6" fill="gray" stroke="black" />
  <circle cx="130" cy="200" r="6" fill="gray" stroke="black" />
  <circle cx="270" cy="200" r="6" fill="gray" stroke="black" />

  <!-- Motor Bolt Pattern (e.g., 6x100 BCD) -->
  <g transform="rotate(30 200 200)">
    <circle cx="200" cy="150" r="4" fill="none" stroke="red" stroke-width="1" />
    <circle cx="200" cy="250" r="4" fill="none" stroke="red" stroke-width="1" />
  </g>
  <g transform="rotate(90 200 200)">
    <circle cx="200" cy="150" r="4" fill="none" stroke="red" stroke-width="1" />
    <circle cx="200" cy="250" r="4" fill="none" stroke="red" stroke-width="1" />
  </g>
  <g transform="rotate(150 200 200)">
    <circle cx="200" cy="150" r="4" fill="none" stroke="red" stroke-width="1" />
    <circle cx="200" cy="250" r="4" fill="none" stroke="red" stroke-width="1" />
  </g>

  <!-- Center Bore -->
  <circle id="center_bore" cx="200" cy="200" r="25" fill="white" stroke="black" stroke-width="2" />

  <text x="50" y="30" font-family="Arial" font-size="16" font-weight="bold">Motor Flange Detail (5mm Steel)</text>
  <text x="210" y="135" font-family="Arial" font-size="12">4x100 M12 Pattern</text>
</svg>
