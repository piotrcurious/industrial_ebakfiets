<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. First Angle Detail -->
  <title>Motor Flange Detail Orthographic</title>

  <!-- 1. PLAN VIEW (Central) -->
  <g id="plan_view" transform="translate(150, 200)">
    <!-- Flange OD 290 (R=145) -->
    <circle r="145" fill="none" stroke="black" stroke-width="2" />

    <!-- 6-Bolt pattern PCD 270 (R=135) -->
    <circle cx="135" cy="0" r="4.5" fill="none" stroke="black" />
    <circle cx="67.5" cy="116.9" r="4.5" fill="none" stroke="black" />
    <circle cx="-67.5" cy="116.9" r="4.5" fill="none" stroke="black" />
    <circle cx="-135" cy="0" r="4.5" fill="none" stroke="black" />
    <circle cx="-67.5" cy="-116.9" r="4.5" fill="none" stroke="black" />
    <circle cx="67.5" cy="-116.9" r="4.5" fill="none" stroke="black" />

    <circle r="7.5" fill="none" stroke="black" stroke-width="1" stroke-dasharray="2,2" /> <!-- Axle hole -->
    <text x="0" y="170" font-family="Arial" font-size="14" text-anchor="middle">PLAN VIEW (290mm Flange)</text>
  </g>

  <!-- 2. SECTION VIEW (Right) -->
  <g id="section_view" transform="translate(450, 200)">
    <rect x="-5" y="-145" width="10" height="290" fill="gray" stroke="black" />
    <line x1="-15" y1="-135" x2="15" y2="-135" stroke="red" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="-15" y1="135" x2="15" y2="135" stroke="red" stroke-width="1" stroke-dasharray="2,2" />
    <text x="0" y="170" font-family="Arial" font-size="14" text-anchor="middle">SECTION VIEW (10mm Steel)</text>
  </g>

  <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Motor Flange detail (Orthographic)</text>
</svg>
