<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <title>Steering Bell Crank (Element Detail)</title>

  <g transform="translate(150, 150)">
    <!-- Body -->
    <path d="M 0,-20 L 120,-12.5 A 12.5,12.5 0 0 1 120,12.5 L 0,20 A 20,20 0 0 1 0,-20 Z" fill="#ccc" stroke="black" stroke-width="2" />

    <!-- Pivots -->
    <circle cx="0" cy="0" r="7.55" fill="white" stroke="black" /> <!-- Shaft ID 15.1 -->
    <circle cx="120" cy="0" r="5.1" fill="white" stroke="black" /> <!-- Rod End 10.2 -->

    <!-- Locking hole -->
    <circle cx="0" cy="-12" r="2.1" fill="red" stroke="none" />

    <!-- Annotations -->
    <line x1="0" y1="35" x2="120" y2="35" stroke="blue" stroke-width="1" />
    <text x="60" y="50" font-family="Arial" font-size="10" fill="blue" text-anchor="middle">Effective Length: 120mm</text>

    <text x="0" y="80" font-family="Arial" font-size="12" text-anchor="middle">Bell Crank (10mm Steel)</text>
  </g>

  <!-- Side View -->
  <g transform="translate(400, 150)">
    <rect x="-5" y="-20" width="10" height="40" fill="#ddd" stroke="black" />
    <text x="0" y="80" font-family="Arial" font-size="12" text-anchor="middle">END VIEW</text>
  </g>

  <text x="250" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">Steering Bell Crank Detail</text>
</svg>
