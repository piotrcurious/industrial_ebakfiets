<svg width="2500" height="1000" viewBox="0 0 2500 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Origin (0,0) is rear axle center at x=500, y=700 -->

  <!-- Main Spars (40x20mm) -->
  <rect id="main_spar_lower" x="500" y="680" width="1800" height="40" fill="none" stroke="black" stroke-width="2" />

  <!-- Head Tube (1-1/4" pipe, OD ~42mm, Length 150mm) -->
  <!-- Angled at 68 degrees (22 degrees from vertical) -->
  <g transform="rotate(-22 2300 680)">
    <rect id="head_tube" x="2279" y="530" width="42" height="150" fill="none" stroke="blue" stroke-width="2" />
  </g>

  <!-- Cargo Bed Area (1210mm long) -->
  <rect id="cargo_bed" x="900" y="640" width="1210" height="40" fill="none" stroke="green" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Rear Dropout (16" wheel, radius 205mm) -->
  <circle id="rear_axle" cx="500" cy="700" r="10" fill="red" />
  <rect id="rear_dropout" x="480" y="680" width="40" height="40" fill="none" stroke="black" stroke-width="2" />

  <!-- Annotation -->
  <text x="500" y="750" font-family="Arial" font-size="20">Rear Axle (0,0)</text>
  <text x="1500" y="750" font-family="Arial" font-size="20">Main Spars (1800mm)</text>
</svg>
