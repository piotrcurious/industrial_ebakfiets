<svg width="2500" height="1000" viewBox="0 0 2500 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Side View -->

  <!-- Main Frame Spars (40x20mm) -->
  <rect id="main_spar_upper" x="500" y="640" width="1800" height="20" fill="lightgray" stroke="black" stroke-width="2" />
  <rect id="main_spar_lower" x="500" y="680" width="1800" height="40" fill="gray" stroke="black" stroke-width="2" />

  <!-- Head Tube (1-1/4" pipe, Angled 68 deg) -->
  <g transform="rotate(-22 2300 680)">
    <rect id="head_tube" x="2279" y="500" width="42" height="180" fill="none" stroke="blue" stroke-width="3" />
    <!-- 6-hole radial pattern indicators -->
    <circle cx="2300" cy="520" r="2" fill="red" />
    <circle cx="2300" cy="660" r="2" fill="red" />
  </g>

  <!-- BB Shell Bridge Plate & Shell -->
  <rect id="bb_bridge" x="700" y="600" width="100" height="10" fill="black" />
  <circle id="bb_shell" cx="750" cy="600" r="17" fill="none" stroke="black" stroke-width="2" />

  <!-- Seat Tube (38mm Pipe) -->
  <rect id="seat_tube" x="730" y="400" width="40" height="200" fill="none" stroke="black" stroke-width="2" />

  <!-- Cargo Bed Reinforcements -->
  <rect id="cargo_mount_front" x="2100" y="640" width="10" height="40" fill="black" />
  <rect id="cargo_mount_rear" x="900" y="640" width="10" height="40" fill="black" />

  <!-- Tapered Rear Triangle (Conceptual line) -->
  <path d="M 500 680 L 300 700 L 500 720" fill="none" stroke="black" stroke-width="3" />

  <!-- Stabilizer Mounting Tabs -->
  <rect x="900" y="720" width="35" height="10" fill="blue" />
  <rect x="2100" y="720" width="35" height="10" fill="blue" />

  <!-- Annotation -->
  <text x="500" y="800" font-family="Arial" font-size="20">Detailed Frame Side View (1:1 Scale)</text>
</svg>
