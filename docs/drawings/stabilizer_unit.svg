<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Side view -->

  <!-- Outer Sleeve (35x35mm) -->
  <rect id="outer_sleeve" x="82.5" y="50" width="35" height="150" fill="none" stroke="black" stroke-width="2" />

  <!-- Inner Leg (25x25mm) -->
  <rect id="inner_leg" x="87.5" y="100" width="25" height="200" fill="none" stroke="blue" stroke-width="2" />

  <!-- M16 Threaded Rod -->
  <rect id="threaded_rod" x="97" y="20" width="6" height="250" fill="gray" stroke="black" stroke-width="1" />

  <!-- Foot Pad (100x100mm) -->
