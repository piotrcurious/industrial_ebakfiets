<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Exploded / Detailed Side view -->

  <!-- Outer Sleeve (35x35x2.5mm) -->
  <rect id="outer_sleeve" x="182.5" y="100" width="35" height="150" fill="none" stroke="black" stroke-width="2" />
  <!-- Welded M16 Nut -->
  <rect id="welded_nut" x="180" y="90" width="40" height="10" fill="black" />

  <!-- Inner Leg (25x25x2.5mm) -->
  <rect id="inner_leg" x="187.5" y="150" width="25" height="250" fill="none" stroke="blue" stroke-width="2" />

  <!-- M16 Threaded Rod (Lead Screw) -->
  <rect id="lead_screw" x="197" y="50" width="6" height="350" fill="gray" stroke="black" stroke-width="1" />
  <!-- Hex Drive Head (19mm) -->
  <rect id="hex_drive" x="190" y="40" width="20" height="10" fill="black" />

  <!-- Foot Pad (100x100x5mm) -->
  <rect id="foot_pad" x="150" y="400" width="100" height="5" fill="black" />

  <!-- Annotation -->
  <text x="50" y="30" font-family="Arial" font-size="18" font-weight="bold">Screw-Driven Stabilizer Detail</text>
  <text x="230" y="120" font-family="Arial" font-size="14">35mm Outer Sleeve</text>
  <text x="230" y="180" font-family="Arial" font-size="14">25mm Inner Leg</text>
</svg>
