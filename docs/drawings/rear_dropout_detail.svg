<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Close-up Side View -->
  <title>Rear Dropout and Hanger Detail</title>

  <!-- Main Spar End (40x20) -->
  <rect x="50" y="150" width="100" height="40" fill="gray" stroke="black" />

  <!-- Dropout Plate (8mm Steel) -->
  <path id="dropout_plate" d="M 150 150 L 250 100 L 300 200 L 250 300 L 150 190 Z" fill="silver" stroke="black" stroke-width="2" />

  <!-- Axle Slot (10.2mm for 10mm flats) -->
  <rect id="axle_slot" x="230" y="180" width="10.2" height="40" rx="5.1" fill="white" stroke="black" />

  <!-- Integrated Derailleur Hanger -->
  <path id="derailleur_hanger" d="M 230 220 L 230 260 L 260 260 L 260 220 Z" fill="silver" stroke="black" />
  <circle id="hanger_thread" cx="245" cy="250" r="5" fill="white" stroke="black" />

  <text x="50" y="50" font-family="Arial" font-size="16" font-weight="bold">Rear Dropout and Hanger Detail</text>
  <text x="50" y="350" font-family="Arial" font-size="12">Material: 8mm Steel Plate</text>
</svg>
