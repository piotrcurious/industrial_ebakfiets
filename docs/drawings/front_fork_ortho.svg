<svg width="1000" height="1200" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- 1:1 Scale. ISO First Angle Ortho -->
  <title>Front Fork Ortho - Verified</title>

  <!-- FRONT VIEW -->
  <g id="front_view" transform="translate(300, 400)">
    <rect x="-125" y="0" width="250" height="10" fill="silver" stroke="black" stroke-width="2" />
    <rect x="-110" y="10" width="25" height="350" fill="none" stroke="black" stroke-width="2" />
    <rect x="85" y="10" width="25" height="350" fill="none" stroke="black" stroke-width="2" />
    <rect x="92.5" y="-300" width="15" height="300" fill="gray" stroke="black" stroke-width="1" />
    <!-- Dimensions -->
    <line x1="-110" y1="380" x2="110" y2="380" stroke="red" stroke-width="1" />
    <text x="0" y="400" font-family="Arial" font-size="14" text-anchor="middle" fill="red">220mm C-C (200mm ID)</text>
  </g>

  <!-- SIDE VIEW -->
  <g id="side_view" transform="translate(700, 400)">
    <rect x="0" y="0" width="40" height="10" fill="gray" stroke="black" />
    <!-- 35mm Rake -->
    <line x1="20" y1="10" x2="55" y2="360" stroke="black" stroke-width="3" />
    <circle id="axle_center" cx="55" cy="360" r="7" fill="none" stroke="blue" />
    <!-- Rake Dimension -->
    <line x1="20" y1="0" x2="20" y2="380" stroke="red" stroke-width="1" stroke-dasharray="5,2" />
    <line x1="55" y1="360" x2="55" y2="380" stroke="red" stroke-width="1" stroke-dasharray="5,2" />
    <line x1="20" y1="375" x2="55" y2="375" stroke="red" stroke-width="1" />
    <text x="37" y="390" font-family="Arial" font-size="12" text-anchor="middle" fill="red">35mm Rake</text>
  </g>

  <text x="500" y="50" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle">Front Fork: Orthographic Detail (Verified)</text>
</svg>
