<svg width="1000" height="1200" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- 1:1 Scale. First Angle Ortho -->
  <title>Front Fork Ortho - Master Assembly Match</title>

  <!-- FRONT VIEW -->
  <g id="front_view" transform="translate(300, 300)">
    <rect x="-125" y="0" width="250" height="10" fill="gray" stroke="black" stroke-width="2" />
    <rect x="-110" y="10" width="20" height="350" fill="none" stroke="black" stroke-width="2" />
    <rect x="90" y="10" width="20" height="350" fill="none" stroke="black" stroke-width="2" />
    <rect x="100" y="-300" width="15" height="300" fill="gray" stroke="black" stroke-width="1" />
    <text x="0" y="400" font-family="Arial" font-size="16" text-anchor="middle">FRONT VIEW (Inner 200mm)</text>
  </g>

  <!-- SIDE VIEW -->
  <g id="side_view" transform="translate(700, 300)">
    <rect x="0" y="0" width="40" height="10" fill="gray" stroke="black" />
    <!-- Rake 35mm -->
    <line x1="20" y1="10" x2="55" y2="360" stroke="black" stroke-width="3" />
    <circle cx="55" cy="360" r="7" fill="none" stroke="red" />
    <text x="20" y="400" font-family="Arial" font-size="16" text-anchor="middle">SIDE VIEW (35mm Rake)</text>
  </g>

  <text x="500" y="50" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle">Fork Drawing: Dimensional Match</text>
</svg>
