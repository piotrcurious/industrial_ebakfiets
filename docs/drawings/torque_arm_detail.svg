<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Side View -->
  <title>Torque Arm Detail</title>

  <!-- Main Body (6-8mm Steel) -->
  <rect id="arm_body" x="50" y="80" width="100" height="40" rx="20" fill="gray" stroke="black" stroke-width="2" />

  <!-- Axle Slot (10.1mm x 14.1mm for M14 axle) -->
  <rect id="axle_slot" x="55" y="93" width="14.1" height="10.1" rx="2" fill="white" stroke="black" />

  <!-- Securing Hole (6.5mm for M6 bolt) -->
  <circle id="securing_hole" cx="130" cy="100" r="3.25" fill="white" stroke="black" />

  <text x="50" y="50" font-family="Arial" font-size="16" font-weight="bold">Torque Arm Detail (6mm Tool Steel)</text>
  <text x="55" y="140" font-family="Arial" font-size="12">M14 Axle Interface</text>
</svg>
