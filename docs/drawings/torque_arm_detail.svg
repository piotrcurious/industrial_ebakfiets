<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Updated to 10mm Steel / 14mm Axle -->
  <title>Torque Arm Detail Orthographic (Final)</title>

  <!-- 1. SIDE VIEW (Central) -->
  <g id="side_view" transform="translate(150, 150)">
    <!-- Arm body -->
    <path d="M -50,-25 L 100,-15 A 15,15 0 0 1 100,15 L -50,25 A 35,35 0 0 1 -50,-25 Z" fill="#ccc" stroke="black" stroke-width="2" />

    <!-- Axle slot: 10.2mm flats for 14mm axle -->
    <rect x="-45.1" y="-5.1" width="16" height="10.2" rx="1" fill="white" stroke="black" />

    <!-- Frame anchor hole (M8) -->
    <circle cx="95" cy="0" r="4.25" fill="white" stroke="black" />

    <!-- Dimensions -->
    <line x1="-45.1" y1="35" x2="95" y2="35" stroke="blue" stroke-width="1" />
    <text x="25" y="50" font-family="Arial" font-size="10" fill="blue" text-anchor="middle">Length: 140mm center-to-center</text>

    <text x="25" y="80" font-family="Arial" font-size="12" text-anchor="middle">SIDE VIEW (Torque Profile)</text>
  </g>

  <!-- 2. FRONT VIEW (Right) -->
  <g id="front_view" transform="translate(450, 150)">
     <!-- 10mm thickness -->
     <rect x="-5" y="-25" width="10" height="50" fill="#ddd" stroke="black" />
     <text x="0" y="80" font-family="Arial" font-size="12" text-anchor="middle">END VIEW (10mm Plate)</text>
  </g>

  <text x="300" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle">High-Torque Arm (Fork-to-Axle)</text>
</svg>
