<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. First Angle Detail -->
  <title>Torque Arm Detail Orthographic</title>

  <!-- 1. SIDE VIEW (Central) -->
  <g id="side_view" transform="translate(150, 150)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="gray" stroke="black" stroke-width="2" />
    <!-- Axle slot -->
    <rect x="-45" y="-5" width="14" height="10" rx="2" fill="white" stroke="black" />
    <circle cx="30" cy="0" r="3.25" fill="white" stroke="black" />
    <text x="0" y="50" font-family="Arial" font-size="14" text-anchor="middle">SIDE VIEW</text>
  </g>

  <!-- 2. FRONT VIEW (Left) -->
  <g id="front_view" transform="translate(450, 150)">
     <rect x="-3" y="-20" width="6" height="40" fill="gray" stroke="black" />
     <text x="0" y="50" font-family="Arial" font-size="14" text-anchor="middle">REAR VIEW (6mm Steel)</text>
  </g>

  <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Torque Arm Detail (Orthographic)</text>
</svg>
