<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Front Cross Section -->
  <title>Front Wheel Hub and Split Rim Assembly</title>

  <rect x="0" y="0" width="600" height="600" fill="#f0f0f0" />

  <!-- HUB MOTOR (250W Direct Drive, 175mm Dropout) -->
  <rect id="hub_motor_body" x="212.5" y="240" width="175" height="120" rx="10" fill="#34495e" stroke="black" stroke-width="2" />
  <rect id="axle_left" x="187.5" y="293" width="25" height="14" fill="#95a5a6" stroke="black" />
  <rect id="axle_right" x="387.5" y="293" width="25" height="14" fill="#95a5a6" stroke="black" />

  <!-- MOTOR FLANGE PLATES (5mm Steel) -->
  <rect id="flange_left" x="212.5" y="150" width="5" height="300" fill="#bdc3c7" stroke="black" />
  <rect id="flange_right" x="382.5" y="150" width="5" height="300" fill="#bdc3c7" stroke="black" />

  <!-- RIM INTERFACE (4x100 Bolt Pattern) -->
  <circle cx="215" cy="180" r="6" fill="#e74c3c" stroke="black" />
  <circle cx="385" cy="180" r="6" fill="#e74c3c" stroke="black" />
  <circle cx="215" cy="420" r="6" fill="#e74c3c" stroke="black" />
  <circle cx="385" cy="420" r="6" fill="#e74c3c" stroke="black" />

  <!-- 13-inch Car Tire (155/70 R13) -->
  <rect id="tire_section" x="222.5" y="26" width="155" height="548" rx="25" fill="none" stroke="black" stroke-width="4" opacity="0.4" />
  <text x="300" y="50" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">155mm Car Tire</text>

  <!-- SPLIT RIM HALVES (13 inch) -->
  <rect id="rim_half_l" x="222.5" y="150" width="10" height="300" fill="#7f8c8d" stroke="black" />
  <rect id="rim_half_r" x="367.5" y="150" width="10" height="300" fill="#7f8c8d" stroke="black" />

  <!-- BRAKE ROTOR (203mm, 6-bolt) -->
  <circle id="brake_rotor" cx="210" cy="300" r="101.5" fill="none" stroke="#c0392b" stroke-width="2" />
  <line x1="208" y1="200" x2="212" y2="200" stroke="#c0392b" stroke-width="1" />
  <line x1="208" y1="400" x2="212" y2="400" stroke="#c0392b" stroke-width="1" />

  <!-- ANNOTATIONS -->
  <text x="300" y="40" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Front Wheel and Motor Assembly</text>

  <line x1="187.5" y1="330" x2="412.5" y2="330" stroke="black" stroke-width="1" />
  <text x="300" y="345" font-family="Arial" font-size="12" text-anchor="middle">175mm Dropout Spacing</text>

  <text x="20" y="580" font-family="Arial" font-size="12" fill="#7f8c8d">Scale: 1px = 1mm | 13 inch Car Tire / 250W Motor</text>
</svg>
