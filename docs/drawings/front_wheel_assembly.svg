<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Front section through hub -->

  <!-- Hub Motor (175mm spacing) -->
  <rect id="hub_motor" x="212.5" y="250" width="175" height="120" fill="gray" stroke="black" stroke-width="2" />

  <!-- Flange Plates (5mm Steel) with M8 Bolts -->
  <rect id="flange_l" x="212.5" y="150" width="5" height="300" fill="silver" stroke="black" />
  <rect id="flange_r" x="382.5" y="150" width="5" height="300" fill="silver" stroke="black" />
  <!-- Fastener locations (M8) -->
  <circle cx="215" cy="200" r="4" fill="black" />
  <circle cx="385" cy="200" r="4" fill="black" />
  <circle cx="215" cy="400" r="4" fill="black" />
  <circle cx="385" cy="400" r="4" fill="black" />

  <!-- 13-inch Car Tire (155mm width, 548mm dia) -->
  <rect id="tire_section" x="222.5" y="26" width="155" height="548" rx="20" fill="none" stroke="black" stroke-width="3" opacity="0.4" />

  <!-- Brake Rotor (203mm) -->
  <circle id="brake_rotor" cx="210" cy="300" r="101.5" fill="none" stroke="red" stroke-width="2" />

  <text x="100" y="40" font-family="Arial" font-size="18" font-weight="bold">Front Wheel Motor Assembly</text>
  <text x="100" y="580" font-family="Arial" font-size="14">Motor: 175mm Dropout | Tire: 155mm Width</text>
</svg>
