<svg width="2500" height="1000" viewBox="0 0 2500 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. Programmatic Composition of Sub-components -->

  <!-- 1. MAIN FRAME -->
  <g id="frame_layer">
    <rect id="main_spar" x="500" y="680" width="1800" height="40" fill="none" stroke="black" stroke-width="3" />
    <rect id="cargo_bed_mount" x="900" y="640" width="1210" height="40" fill="none" stroke="green" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Head Tube -->
    <g transform="rotate(-22 2300 680)">
      <rect id="head_tube_housing" x="2279" y="530" width="42" height="150" fill="none" stroke="blue" stroke-width="2" />
    </g>
  </g>

  <!-- 2. FRONT FORK & STEERING (Composed) -->
  <g id="fork_steering_layer" transform="translate(2020, 200) rotate(0)">
     <!-- Fork Crown -->
     <rect x="250" y="480" width="60" height="10" fill="black" />
     <!-- Fork Legs -->
     <rect x="250" y="490" width="10" height="350" fill="none" stroke="black" stroke-width="2" />
     <!-- Steerer Rod -->
     <rect x="272.5" y="180" width="15" height="300" fill="gray" />
  </g>

  <!-- 3. WHEELS -->
  <g id="wheels_layer">
    <!-- Rear Wheel (16") -->
    <circle cx="500" cy="700" r="205" fill="none" stroke="black" stroke-width="5" opacity="0.4" />
    <!-- Front Wheel (13") -->
    <circle cx="2300" cy="730" r="274" fill="none" stroke="black" stroke-width="5" opacity="0.4" />
  </g>

  <!-- 4. STABILIZERS -->
  <g id="stabilizer_layer">
     <rect x="900" y="680" width="35" height="150" fill="none" stroke="blue" stroke-width="1" />
     <rect x="2110" y="680" width="35" height="150" fill="none" stroke="blue" stroke-width="1" />
  </g>

  <text x="1000" y="50" font-family="Arial" font-size="30" font-weight="bold">Industrial E-Bakfiets: Full Assembly Design</text>
  <text x="500" y="950" font-family="Arial" font-size="20">Scale: 1px = 1mm | Verified for dimensional consistency</text>
</svg>
