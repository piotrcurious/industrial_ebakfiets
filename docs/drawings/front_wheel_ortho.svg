<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- 1:1 Scale. ISO First Angle Ortho. v6 Integrated Design -->
  <title>Front Wheel Ortho - Verified v6</title>

  <rect x="0" y="0" width="800" height="1200" fill="#fcfcfc" />

  <!-- FRONT/SECTIONAL VIEW -->
  <g id="front_view" transform="translate(400, 300)">
    <!-- Tire Outline (548mm OD, 155mm Width) -->
    <rect x="-77.5" y="-274" width="155" height="548" rx="40" fill="#222" />

    <!-- Rim Outline (330mm Dia) -->
    <rect x="-60" y="-165" width="120" height="330" fill="#777" stroke="black" />

    <!-- Hub Motor (240mm Dia, 175mm Dropout Spacing) -->
    <rect x="-87.5" y="-120" width="175" height="240" fill="gray" stroke="black" />

    <!-- Axle (M14) -->
    <rect x="-115" y="-7" width="230" height="14" fill="black" />

    <!-- Dimensions -->
    <line x1="-77.5" y1="300" x2="77.5" y2="300" stroke="red" stroke-width="1" />
    <text x="0" y="320" font-family="Arial" font-size="16" text-anchor="middle" fill="red">155mm Tread Width</text>

    <line x1="-87.5" y1="-140" x2="87.5" y2="-140" stroke="red" stroke-width="1" />
    <text x="0" y="-150" font-family="Arial" font-size="16" text-anchor="middle" fill="red">175mm Dropout Spacing</text>
  </g>

  <!-- SIDE VIEW -->
  <g id="side_view" transform="translate(400, 850)">
    <!-- Tire Circle -->
    <circle cx="0" cy="0" r="274" fill="none" stroke="#222" stroke-width="20" />
    <!-- Rim Circle -->
    <circle cx="0" cy="0" r="165" fill="none" stroke="#777" stroke-width="10" />
    <!-- Hub Motor Circle -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="gray" stroke-width="5" />

    <!-- 4-Bolt Pattern for Split Rim (PCD 100mm) -->
    <circle cx="35.3" cy="35.3" r="4" fill="red" />
    <circle cx="-35.3" cy="35.3" r="4" fill="red" />
    <circle cx="-35.3" cy="-35.3" r="4" fill="red" />
    <circle cx="35.3" cy="-35.3" r="4" fill="red" />

    <!-- Dimensions -->
    <line x1="0" y1="0" x2="274" y2="0" stroke="red" stroke-width="1" />
    <text x="137" y="-10" font-family="Arial" font-size="16" text-anchor="middle" fill="red">548mm OD</text>
  </g>

  <text x="400" y="50" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle">Front Wheel Assembly Detail (Verified v6)</text>
</svg>
