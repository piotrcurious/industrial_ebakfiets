<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Scale: 1px = 1mm. First Angle Ortho -->
  <title>Front Wheel Orthographic Projection</title>

  <!-- 1. FRONT VIEW (Central Sectional) -->
  <g id="front_view" transform="translate(400, 300)">
    <!-- Hub Motor (175mm) -->
    <rect x="-87.5" y="-60" width="175" height="120" fill="none" stroke="black" stroke-width="2" />
    <!-- Flanges -->
    <rect x="-87.5" y="-150" width="5" height="300" fill="none" stroke="black" stroke-width="2" />
    <rect x="82.5" y="-150" width="5" height="300" fill="none" stroke="black" stroke-width="2" />
    <!-- 13" Tire (548mm dia, 155mm wide) -->
    <rect x="-77.5" y="-274" width="155" height="548" rx="20" fill="none" stroke="black" stroke-width="2" opacity="0.4" />
    <text x="0" y="300" font-family="Arial" font-size="16" text-anchor="middle">FRONT VIEW (SECTION)</text>
  </g>

  <!-- 2. SIDE VIEW (Below Front View) -->
  <g id="side_view" transform="translate(400, 850)">
    <!-- Tire Outer (548mm dia) -->
    <circle cx="0" cy="0" r="274" fill="none" stroke="black" stroke-width="2" />
    <!-- Split Rim (13") -->
    <circle cx="0" cy="0" r="165" fill="none" stroke="gray" stroke-width="1" stroke-dasharray="5,2" />
    <!-- Hub flange circle -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="black" stroke-width="1" />
    <text x="0" y="320" font-family="Arial" font-size="16" text-anchor="middle">SIDE VIEW</text>
  </g>

  <text x="400" y="50" font-family="Arial" font-size="30" font-weight="bold" text-anchor="middle">Front Wheel Assy: Orthographic Projection</text>
</svg>
